<!DOCTYPE html>
<html>

<head>
    <title>Login</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="sidebar">

    <h2>Shiny Bets</h2>

    <a href="/">Home</a>

    <a href="/bets">Current Bets</a>

    <a href="/history">Past Bets</a>

    <a href="/leaderboard">Leaderboard</a>

    <a href="/login">Login</a>

</div>

<div class="main">

    <div class="card" style="
        max-width:500px;
        margin:auto;
        margin-top:100px;
        text-align:center;
    ">

        <h1>Login</h1>

        <p style="color:#999;">
            Access your betting dashboard
        </p>

        <form method="POST">

            <input
                name="username"
                placeholder="Username"
                required
            ><br><br>

            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            ><br><br>

            <button type="submit">
                Login
            </button>

        </form>

        <hr style="margin:30px 0;">

        <button style="
            background:#5865F2;
            color:white;
            width:100%;
        ">
            Login with Discord
        </button>

    </div>

</div>

</body>
</html>
