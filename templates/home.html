<!DOCTYPE html>
<html>

<head>
    <title>Shiny Bets</title>

    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
<button class="menu-btn" onclick="toggleSidebar()">
    ☰ Menu
</button>
{% include 'components/sidebar.html' %}

<div class="main">

    <h1>Welcome to Shiny Bets</h1>

    <div class="card">

        <h2>Live Shiny Encounter Betting</h2>

        <p>
            Bet on when players will encounter shiny Pokémon.
        </p>

        <img
            src="https://img.pokemondb.net/sprites/home/shiny/rayquaza.png"
            width="250"
        >

    </div>

    <div class="card">

        <h2>Current Active Bets</h2>

        <p>{{ bets|length }} active bets running.</p>

    </div>

</div>
<script>

function toggleSidebar() {

    document
        .querySelector('.sidebar')
        .classList
        .toggle('active');

}

</script>
</body>
</html>
