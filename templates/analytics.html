<!DOCTYPE html>
<html>

<head>

    <title>Analytics</title>

    <link rel="stylesheet" href="/static/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<button class="menu-btn" onclick="toggleSidebar()">
    ☰ Menu
</button>

{% include 'components/sidebar.html' %}

<div class="main">

    <h1>House Analytics</h1>

    <div class="bets-container">

        <div class="bet-card analytics-card">

            <h2>Total House Earnings</h2>

            <h1 class="profit-text">
                ¥{{ "{:,.0f}".format(house_profit) }}
            </h1>

            <p>
                Total Bet Volume:
                <strong>
                    ¥{{ "{:,.0f}".format(total_bets) }}
                </strong>
            </p>

            <p>
                Total Paid Out:
                <strong>
                    ¥{{ "{:,.0f}".format(total_payouts) }}
                </strong>
            </p>

            <p>
                House Win Rate:
                <strong>
                    {{ losses }}
                </strong>
            </p>

            <p>
                Player Win Rate:
                <strong>
                    {{ wins }}
                </strong>
            </p>

        </div>

        <div class="card analytics-chart-card">

            <canvas id="profitChart"></canvas>

        </div>

    </div>

</div>

<script>

const ctx =
    document.getElementById('profitChart');

new Chart(ctx, {

    type: 'doughnut',

    data: {

        labels: [

            'House Wins',
            'Player Wins'

        ],

        datasets: [{

            data: [

                {{ losses }},
                {{ wins }}

            ],

            backgroundColor: [

                '#00ff99',
                '#ff4444'

            ],

            borderWidth: 0

        }]

    },

    options: {

        responsive: true,

        plugins: {

            legend: {

                labels: {

                    color: 'white',

                    font: {

                        size: 16

                    }

                }

            }

        }

    }

});

function toggleSidebar() {

    document
        .querySelector('.sidebar')
        .classList
        .toggle('active');

}

</script>

</body>
</html>
