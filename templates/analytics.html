<!DOCTYPE html>
<html>

<head>
    <title>Analytics</title>

    <link rel="stylesheet" href="/static/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<button class="menu-btn" onclick="toggleSidebar()">
    ☰ Menu
</button>

{% include 'components/sidebar.html' %}

<div class="main">

    <h1>House Analytics</h1>

<div class="bets-container">

    {% for bet in bets %}

    <div class="bet-card">

    <h2>Total House Earnings</h2>

    <h1 style="color:#00ff99;">

        ¥{{ "{:,.0f}".format(house_profit) }}

    </h1>

    <p>
        Total Bet Volume:
        ¥{{ "{:,.0f}".format(total_bets) }}
    </p>

    <p>
        Total Paid Out:
        ¥{{ "{:,.0f}".format(total_payouts) }}
    </p>

</div>
    <div class="card">

        <canvas id="profitChart"></canvas>

    </div>

</div>

</div>

<script>

const ctx = document.getElementById('profitChart');

new Chart(ctx, {

    type: 'doughnut',

    data: {

        labels: [

            'House Wins',
            'Player Wins'

        ],

        datasets: [{

            data: [

                {{ losses }},
                {{ wins }}

            ],

            backgroundColor: [

                '#00ff99',
                '#ff5555'

            ],

            borderWidth: 0

        }]
    },

    options: {

        plugins: {

            legend: {

                labels: {

                    color: 'white',
                    font: {
                        size: 16
                    }

                }

            }

        }

    }

});

</script>
<script>

function toggleSidebar() {

    document
        .querySelector('.sidebar')
        .classList
        .toggle('active');

}

</script>
</body>
</html>
